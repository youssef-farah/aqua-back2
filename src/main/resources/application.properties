spring.application.name=Aqua-1
spring.datasource.url=jdbc:mysql://localhost:3306/dbaquayoussef?createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.username=root
spring.datasource.password=youssef
spring.jpa.hibernate.ddl-auto = update
server.port=8085
spring.web.resources.static-locations=classpath:/static/,file:uploads/
# SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=TRACE
logging.level.org.hibernate.type.descriptor.sql=TRACE

# JDBC Errors
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=TRACE
logging.level.org.hibernate.engine.jdbc.batch.internal.BatchingBatch=DEBUG

# Transaction + ORM
logging.level.org.springframework.transaction=TRACE
logging.level.org.springframework.orm.jpa=DEBUG

# Hibernate Events (entity states)
logging.level.org.hibernate.event.internal.DefaultFlushEntityEventListener=TRACE
logging.level.org.hibernate.event.internal.DefaultPersistEventListener=TRACE

# Bean Validation (VERY IMPORTANT)
logging.level.org.hibernate.validator=INFO
logging.level.org.hibernate.validator.internal.engine=TRACE
logging.level.org.hibernate.validator.internal.engine.constraintvalidation=TRACE
logging.level.org.hibernate.validator.internal.engine.constraint=TRACE

# Show full error details
server.error.include-message=always
server.error.include-stacktrace=always


server.error.include-binding-errors=always
logging.level.org.hibernate.engine.transaction=TRACE
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=TRACE


